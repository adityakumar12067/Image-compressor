<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi Image Tools</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/browser-image-compression/dist/browser-image-compression.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body class="bg-gray-100 p-6">

<h1 class="text-3xl font-bold mb-6 text-center">Image Tools</h1>

<div class="max-w-xl mx-auto bg-white p-6 rounded-xl shadow">

<input type="file" id="fileInput" class="mb-4">

<div class="flex gap-2 flex-wrap">

<button onclick="compressImage()" class="bg-blue-500 text-white px-4 py-2 rounded">
Compress
</button>

<button onclick="convertPDF()" class="bg-green-500 text-white px-4 py-2 rounded">
Image → PDF
</button>

<button onclick="resizeImage()" class="bg-purple-500 text-white px-4 py-2 rounded">
Resize
</button>

<button onclick="addWatermark()" class="bg-pink-500 text-white px-4 py-2 rounded">
Watermark
</button>

</div>

<div id="result" class="mt-6"></div>

</div>

<script>

const input=document.getElementById("fileInput")
const result=document.getElementById("result")

// IMAGE COMPRESS
async function compressImage(){

const file=input.files[0]

if(!file){
alert("Upload image first")
return
}

const options={
maxSizeMB:1,
maxWidthOrHeight:1280,
useWebWorker:true
}

const compressed=await imageCompression(file,options)

const url=URL.createObjectURL(compressed)

result.innerHTML=`
<p>Compressed Size: ${(compressed.size/1024).toFixed(1)} KB</p>
<a href="${url}" download="compressed.jpg" class="text-blue-600">Download</a>
`
}


// IMAGE TO PDF
async function convertPDF(){

const file=input.files[0]

if(!file){
alert("Upload image first")
return
}

const reader=new FileReader()

reader.onload=function(e){

const {jsPDF}=window.jspdf

const pdf=new jsPDF()

pdf.addImage(e.target.result,'JPEG',10,10,180,160)

pdf.save("image.pdf")

}

reader.readAsDataURL(file)

}


// IMAGE RESIZE
function resizeImage(){

const file=input.files[0]

if(!file){
alert("Upload image first")
return
}

const img=new Image()

img.src=URL.createObjectURL(file)

img.onload=function(){

const canvas=document.createElement("canvas")

canvas.width=500
canvas.height=500

const ctx=canvas.getContext("2d")

ctx.drawImage(img,0,0,500,500)

canvas.toBlob(function(blob){

const url=URL.createObjectURL(blob)

result.innerHTML=`<a href="${url}" download="resized.jpg">Download Resized</a>`

})

}

}


// WATERMARK
function addWatermark(){

const file=input.files[0]

if(!file){
alert("Upload image first")
return
}

const img=new Image()

img.src=URL.createObjectURL(file)

img.onload=function(){

const canvas=document.createElement("canvas")

canvas.width=img.width
canvas.height=img.height

const ctx=canvas.getContext("2d")

ctx.drawImage(img,0,0)

ctx.font="40px Arial"

ctx.fillStyle="white"

ctx.fillText("Watermark",50,50)

canvas.toBlob(function(blob){

const url=URL.createObjectURL(blob)

result.innerHTML=`<a href="${url}" download="watermark.png">Download Image</a>`

})

}

}

</script>

</body>
</html>
