<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImagePro | Professional Compressor & Comparison Tool</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/browser-image-compression/2.0.2/browser-image-compression.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .dark { background-color: #0f172a; color: white; }
        
        /* ⭐ COMPARISON SLIDER CSS */
        .comparison-container {
            position: relative;
            width: 100%;
            max-height: 50vh;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            background: #eee;
        }
        #afterImage {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            clip-path: inset(0 0 0 50%); /* Start at half */
        }
        #beforeImage {
            display: block;
            width: 100%;
            height: auto;
            max-height: 50vh;
            object-fit: contain;
        }
        .slider-line {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 50%;
            width: 4px;
            background: #ef4444;
            cursor: ew-resize;
            z-index: 10;
        }
        .slider-handle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            background: #ef4444;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.5);
            pointer-events: none;
        }

        /* UI BUTTONS FIX (Based on your feedback) */
        .target-btn {
            padding: 14px;
            border-radius: 14px;
            background: #1e293b;
            color: white;
            font-weight: 800;
            font-size: 11px;
            border: 2px solid transparent;
            transition: 0.3s;
        }
        .target-btn.active {
            background: #ef4444;
            border-color: #ef4444;
            box-shadow: 0 8px 15px rgba(239, 68, 68, 0.3);
        }
        .label-badge {
            position: absolute;
            top: 10px;
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            z-index: 5;
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 transition-colors">

    <nav class="h-16 flex justify-between items-center px-6 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b">
        <div class="font-black text-xl tracking-tighter uppercase dark:text-white">
            <span class="bg-red-600 text-white px-2 py-1 rounded-md mr-1">I</span>PRO
        </div>
        <button onclick="document.body.classList.toggle('dark')" class="p-2 dark:text-white"><i class="fas fa-adjust"></i></button>
    </nav>

    <header class="py-16 px-6 text-center">
        <h1 class="text-4xl md:text-5xl font-extrabold mb-6 dark:text-white">Compare & <span class="text-red-600">Compress</span></h1>
        <div id="dropArea" onclick="document.getElementById('fileInput').click()" class="max-w-xl mx-auto border-4 border-dashed border-slate-200 dark:border-slate-700 p-12 rounded-[3rem] bg-white dark:bg-slate-800 transition-all hover:border-red-500 cursor-pointer shadow-sm">
            <i class="fas fa-images text-5xl text-slate-200 mb-4"></i>
            <p class="font-bold text-slate-400 uppercase tracking-widest text-xs">Drop Image to See the Magic</p>
        </div>
    </header>

    <div id="editorModal" class="fixed inset-0 bg-slate-900/95 backdrop-blur-xl hidden z-[100] flex items-center justify-center p-4">
        <div class="bg-white dark:bg-slate-800 w-full max-w-5xl rounded-[3rem] overflow-hidden flex flex-col md:flex-row shadow-2xl">
            
            <div class="flex-[1.5] bg-black p-4 flex items-center justify-center relative">
                <div class="comparison-container" id="sliderContainer">
                    <span class="label-badge bg-black/50 text-white left-4">Original</span>
                    <span class="label-badge bg-red-600 text-white right-4">Compressed</span>
                    
                    <img id="beforeImage" src="" alt="Original">
                    <img id="afterImage" src="" alt="Compressed">
                    
                    <div class="slider-line" id="sliderLine">
                        <div class="slider-handle"><i class="fas fa-arrows-alt-h"></i></div>
                    </div>
                </div>
            </div>
            
            <div class="w-full md:w-80 p-8 flex flex-col gap-8">
                <div>
                    <h2 class="text-sm font-black text-slate-400 uppercase tracking-[0.2em] mb-6">Optimization</h2>
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="updateTarget(20, this)" class="target-btn">20KB</button>
                        <button onclick="updateTarget(50, this)" class="target-btn active">50KB</button>
                        <button onclick="updateTarget(100, this)" class="target-btn">100KB</button>
                        <button onclick="updateTarget(200, this)" class="target-btn">200KB</button>
                    </div>
                </div>

                <div class="bg-slate-50 dark:bg-slate-700/50 p-4 rounded-2xl">
                    <div class="flex justify-between text-[10px] font-black uppercase text-slate-400 mb-2">
                        <span>Original</span>
                        <span id="origSizeText">0 KB</span>
                    </div>
                    <div class="flex justify-between text-[10px] font-black uppercase text-red-500">
                        <span>New Size</span>
                        <span id="newSizeText">Processing...</span>
                    </div>
                </div>

                <div class="mt-auto space-y-3">
                    <button onclick="downloadFinal()" class="w-full py-5 bg-red-600 text-white rounded-[1.5rem] font-black text-lg shadow-xl shadow-red-500/20 hover:scale-[1.02] transition">DOWNLOAD</button>
                    <button onclick="closeModal()" class="w-full py-3 text-slate-400 font-bold text-xs uppercase tracking-widest">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <input type="file" id="fileInput" class="hidden" accept="image/*">

    <script>
        let currentFile, compressedBlob;
        const beforeImg = document.getElementById('beforeImage');
        const afterImg = document.getElementById('afterImage');
        const sliderContainer = document.getElementById('sliderContainer');
        const sliderLine = document.getElementById('sliderLine');
        let targetKB = 50;

        // Slider Logic
        sliderContainer.addEventListener('mousemove', (e) => {
            const rect = sliderContainer.getBoundingClientRect();
            let x = e.clientX - rect.left;
            if (x < 0) x = 0;
            if (x > rect.width) x = rect.width;
            
            const percent = (x / rect.width) * 100;
            sliderLine.style.left = percent + '%';
            afterImg.style.clipPath = `inset(0 0 0 ${percent}%)`;
        });

        document.getElementById('fileInput').onchange = async (e) => {
            const file = e.target.files[0];
            if(file) {
                currentFile = file;
                document.getElementById('origSizeText').innerText = (file.size / 1024).toFixed(1) + " KB";
                beforeImg.src = URL.createObjectURL(file);
                document.getElementById('editorModal').classList.remove('hidden');
                runCompression();
            }
        };

        async function updateTarget(kb, btn) {
            targetKB = kb;
            document.querySelectorAll('.target-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            runCompression();
        }

        async function runCompression() {
            const options = { maxSizeMB: targetKB / 1024, maxWidthOrHeight: 1920, useWebWorker: true };
            try {
                compressedBlob = await imageCompression(currentFile, options);
                afterImg.src = URL.createObjectURL(compressedBlob);
                document.getElementById('newSizeText').innerText = (compressedBlob.size / 1024).toFixed(1) + " KB";
            } catch (e) { console.error(e); }
        }

        function downloadFinal() {
            const a = document.createElement('a');
            a.href = URL.createObjectURL(compressedBlob);
            a.download = `${targetKB}kb_${currentFile.name}`;
            a.click();
        }

        function closeModal() {
            document.getElementById('editorModal').classList.add('hidden');
        }
    </script>
</body>
</html>
