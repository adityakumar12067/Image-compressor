<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Image Compressor</title>
    <!-- Tailwind CSS for Professional Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Image Compression Library -->
    <script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .drop-zone {
            transition: all 0.3s ease;
            border: 2px dashed #cbd5e1;
        }
        .drop-zone:hover, .drop-zone.dragover {
            border-color: #3b82f6;
            background-color: #eff6ff;
        }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: none;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col items-center justify-center p-4">

    <!-- Main Container -->
    <div class="bg-white w-full max-w-2xl rounded-2xl shadow-xl overflow-hidden">
        
        <!-- Header -->
        <div class="bg-blue-600 p-6 text-center">
            <h1 class="text-3xl font-bold text-white">Image Compressor</h1>
            <p class="text-blue-100 mt-2 text-sm">Compress images without losing quality</p>
        </div>

        <div class="p-8">
            
            <!-- Upload Area -->
            <div id="drop-zone" class="drop-zone rounded-xl p-10 text-center cursor-pointer relative">
                <input type="file" id="file-input" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" accept="image/*">
                <div class="pointer-events-none">
                    <svg class="mx-auto h-12 w-12 text-gray-400" stroke="currentColor" fill="none" viewBox="0 0 48 48">
                        <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                    <p class="mt-2 text-sm text-gray-600 font-medium">Click to upload or drag and drop</p>
                    <p class="text-xs text-gray-400 mt-1">JPG, PNG, WEBP, GIF supported</p>
                </div>
            </div>

            <!-- Settings (Hidden initially) -->
            <div id="settings-area" class="hidden mt-6 border-t pt-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- Original Size -->
                    <div class="bg-gray-50 p-4 rounded-lg">
                        <p class="text-xs text-gray-500 uppercase font-bold">Original Size</p>
                        <p id="original-size" class="text-lg font-semibold text-gray-800">0 KB</p>
                    </div>
                    
                    <!-- Target Size Input -->
                    <div class="bg-gray-50 p-4 rounded-lg">
                        <p class="text-xs text-gray-500 uppercase font-bold">Target Size (Optional)</p>
                        <div class="flex items-center gap-2 mt-1">
                            <input type="number" id="target-size" placeholder="e.g. 500" class="w-full p-2 border rounded text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <select id="unit-select" class="border rounded text-sm bg-white">
                                <option value="KB">KB</option>
                                <option value="MB">MB</option>
                            </select>
                        </div>
                        <p class="text-xs text-gray-400 mt-1">Leave empty to use default quality</p>
                    </div>
                </div>

                <button id="compress-btn" class="w-full mt-6 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 flex justify-center items-center gap-2">
                    <span>Compress Image</span>
                    <div class="loader" id="loader"></div>
                </button>
            </div>

            <!-- Result Area (Hidden initially) -->
            <div id="result-area" class="hidden mt-6 border-t pt-6 text-center">
                <div class="flex justify-center mb-4">
                    <img id="preview-image" class="max-h-64 rounded-lg shadow-md border border-gray-200" src="" alt="Compressed Preview">
                </div>
                
                <div class="flex justify-center gap-4 mb-6">
                    <div class="text-center">
                        <p class="text-xs text-gray-500">Original</p>
                        <p id="res-original" class="font-bold text-gray-700">0 KB</p>
                    </div>
                    <div class="text-center">
                        <p class="text-xs text-gray-500">Compressed</p>
                        <p id="res-compressed" class="font-bold text-green-600 text-lg">0 KB</p>
                    </div>
                    <div class="text-center">
                        <p class="text-xs text-gray-500">Saved</p>
                        <p id="res-saved" class="font-bold text-blue-600 text-lg">0%</p>
                    </div>
                </div>

                <a id="download-link" href="#" class="inline-block bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-8 rounded-lg shadow-lg transition duration-200">
                    Download Image
                </a>
            </div>

        </div>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const settingsArea = document.getElementById('settings-area');
        const originalSizeDisplay = document.getElementById('original-size');
        const compressBtn = document.getElementById('compress-btn');
        const loader = document.getElementById('loader');
        const resultArea = document.getElementById('result-area');
        const previewImage = document.getElementById('preview-image');
        const downloadLink = document.getElementById('download-link');
        const targetSizeInput = document.getElementById('target-size');
        const unitSelect = document.getElementById('unit-select');

        let currentFile = null;

        // Drag and Drop Effects
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                handleFile(e.dataTransfer.files[0]);
            }
        });

        // File Input Change
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) {
                handleFile(e.target.files[0]);
            }
        });

        function handleFile(file) {
            currentFile = file;
            
            // Show Settings
            settingsArea.classList.remove('hidden');
            resultArea.classList.add('hidden');
            
            // Display Original Size
            const sizeInKB = (file.size / 1024).toFixed(2);
            originalSizeDisplay.textContent = `${sizeInKB} KB`;
        }

        // Compression Logic
        compressBtn.addEventListener('click', async () => {
            if (!currentFile) return;

            // UI Loading State
            compressBtn.disabled = true;
            loader.style.display = 'block';
            compressBtn.querySelector('span').textContent = 'Compressing...';

            try {
                const options = {
                    maxSizeMB: 1, // Default max size
                    maxWidthOrHeight: 1920,
                    useWebWorker: true,
                    initialQuality: 0.8
                };

                // Check if user wants specific size
                const targetVal = parseFloat(targetSizeInput.value);
                const unit = unitSelect.value;

                if (!isNaN(targetVal) && targetVal > 0) {
                    // Convert KB to MB for the library
                    if (unit === 'KB') {
                        options.maxSizeMB = targetVal / 1024;
                    } else {
                        options.maxSizeMB = targetVal;
                    }
                }

                // Run Compression
                const compressedFile = await imageCompression(currentFile, options);
                
                // Display Results
                displayResult(compressedFile);

            } catch (error) {
                console.error(error);
                alert("Error compressing image. Please try again.");
            } finally {
                // Reset UI
                compressBtn.disabled = false;
                loader.style.display = 'none';
                compressBtn.querySelector('span').textContent = 'Compress Image';
            }
        });

        function displayResult(file) {
            resultArea.classList.remove('hidden');
            
            // Create URL for preview
            const url = URL.createObjectURL(file);
            previewImage.src = url;
            downloadLink.href = url;
            downloadLink.download = `compressed_${file.name}`;

            // Calculate Stats
            const originalSize = currentFile.size;
            const newSize = file.size;
            const savedBytes = originalSize - newSize;
            const savedPercent = ((savedBytes / originalSize) * 100).toFixed(1);

            // Update Text
            document.getElementById('res-original').textContent = (originalSize / 1024).toFixed(2) + ' KB';
            document.getElementById('res-compressed').textContent = (newSize / 1024).toFixed(2) + ' KB';
            document.getElementById('res-saved').textContent = savedPercent > 0 ? `-${savedPercent}%` : '+0%';
        }
    </script>
</body>
</html>
